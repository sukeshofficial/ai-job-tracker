spring.application.name=server

# PostgreSQL Database Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/ai_job_tracker
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate/JPA Settings for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MATCHING TAMIL-DEVELOPER PORT
server.port=5000

# JWT Configuration (MATCHING TAMIL-DEVELOPER)
jwt.secret=${JWT_SECRET}
jwt.refresh-secret=${JWT_REFRESH_SECRET}
jwt.expiration-ms=900000
jwt.refresh-expiration-ms=604800000
jwt.cookie-name=accessToken
jwt.refresh-cookie-name=refreshToken

# Spring Mail (OTP Service)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sukesh.official.2006@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OAuth2 Configuration (MATCHING TAMIL-DEVELOPER)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:5000/api/v1/auth/google/callback

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:5000/api/v1/auth/github/callback
